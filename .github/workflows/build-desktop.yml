name: Build desktop installers

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

permissions:
  contents: read

concurrency:
  group: desktop-installers-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify source
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.4
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            xdg-utils
      - name: Install frontend dependencies
        run: npm ci
      - name: Audit frontend dependencies
        run: npm audit --audit-level=high
      - name: Test frontend
        run: npm test -- --run
      - name: Lint frontend
        run: npm run lint
      - name: Build frontend
        run: npm run build
      - name: Test coordinator
        run: npm --prefix deploy/coordinator test
      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check
      - name: Test Rust backend
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-targets --all-features
      - name: Lint Rust backend
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

  build:
    name: Build ${{ matrix.label }}
    needs: verify
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS universal DMG
            os: macos-15
            build_args: --target universal-apple-darwin --bundles dmg
            artifact_name: macos-universal
            artifact_path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/*.dmg
          - label: Windows x64 installer
            os: windows-2022
            build_args: --bundles nsis
            artifact_name: windows-x86_64
            artifact_path: src-tauri/target/release/bundle/nsis/*.exe
          - label: Linux x64 packages
            os: ubuntu-22.04
            build_args: --bundles deb,appimage
            artifact_name: linux-x86_64
            artifact_path: |
              src-tauri/target/release/bundle/deb/*.deb
              src-tauri/target/release/bundle/appimage/*.AppImage
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.4
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install macOS universal Rust targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev \
            patchelf \
            xdg-utils
      - name: Install frontend dependencies
        run: npm ci
      - name: Build installer
        run: npm run tauri build -- ${{ matrix.build_args }}
      - name: Upload installer
        uses: actions/upload-artifact@v7
        with:
          name: trusted-carpool-${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20.19.4
      - name: Verify tag matches application version
        shell: bash
        run: |
          APP_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          test "${GITHUB_REF_NAME}" = "v${APP_VERSION}" || {
            echo "Tag ${GITHUB_REF_NAME} does not match application version v${APP_VERSION}" >&2
            exit 1
          }
      - name: Download installers
        uses: actions/download-artifact@v8
        with:
          pattern: trusted-carpool-*
          path: release-assets
          merge-multiple: true
      - name: Create checksums
        shell: bash
        run: |
          find release-assets -type f ! -name SHA256SUMS.txt -print0 \
            | sort -z \
            | while IFS= read -r -d '' file; do
                hash="$(sha256sum "$file" | cut -d ' ' -f 1)"
                printf '%s  %s\n' "$hash" "$(basename "$file")"
              done > release-assets/SHA256SUMS.txt
          test -s release-assets/SHA256SUMS.txt
      - name: Publish release and attach installers
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mapfile -d '' assets < <(find release-assets -type f -print0 | sort -z)
          test "${#assets[@]}" -ge 4
          gh release create "${GITHUB_REF_NAME}" "${assets[@]}" \
            --verify-tag \
            --generate-notes \
            --title "可信拼车 ${GITHUB_REF_NAME}"
