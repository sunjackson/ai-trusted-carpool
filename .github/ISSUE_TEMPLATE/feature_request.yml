name: 功能建议
description: 提出新功能或改进建议
title: "[Feature] "
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        提交前请先阅读 docs/PRODUCT-BRIEF.md 与 docs/BUSINESS-MODEL.md 了解产品边界：
        项目只做「一键发车」和「一键上车」，不引入押金、积分、结算、扣罚或用户等级。
  - type: textarea
    id: problem
    attributes:
      label: 想解决的问题
      description: 描述你遇到的场景和痛点，而不是直接给实现方案。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 建议的做法
      description: 你期望的交互或行为。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑过的替代方案
  - type: checkboxes
    id: scope
    attributes:
      label: 边界确认
      options:
        - label: 该建议不涉及押金、积分、结算、转售等交易功能
          required: true
