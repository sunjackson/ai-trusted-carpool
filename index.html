<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f1115" />
    <link rel="icon" type="image/png" href="/src-tauri/icons/32x32.png" />
    <title>可信拼车</title>
    <style>
      html, body, #root { min-height: 100%; margin: 0; background: #0f1115; }
      .boot-splash { min-height: 100vh; display: grid; place-content: center; gap: 14px; color: #f0d277; text-align: center; font: 600 14px/1.5 system-ui, sans-serif; }
      .boot-splash__mark { width: 44px; height: 44px; margin: 0 auto; display: grid; place-items: center; border: 1px solid #5c4b20; border-radius: 14px; background: #242013; font-size: 22px; }
      .boot-splash small { color: #858e99; font-size: 11px; font-weight: 400; }
    </style>
  </head>
  <body>
    <div id="root">
      <main id="boot-splash" class="boot-splash" aria-label="应用正在启动">
        <span class="boot-splash__mark">车</span>
        <span>正在安全启动</span>
        <small>首次打开时正在准备安全运行环境</small>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
